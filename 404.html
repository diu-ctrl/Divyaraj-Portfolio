<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Divyaraj Chauhan</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5C3AED;
            --accent-1: #4D55CC;
            --secondary-1: #0E192D;
            --secondary-2: #262276;
            --secondary-3: #B3B0FF;
            --bg: #03040a;
            --text: #f0f0f5;
            --text-muted: #8a8fb5;
            --border: rgba(255, 255, 255, 0.06);
            --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-mono:  'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── Background Atmosphere ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            z-index: -2;
            animation: float 25s infinite ease-in-out;
            pointer-events: none;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -150px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-2);
            bottom: -100px;
            right: -100px;
            animation-delay: -8s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -45px) scale(1.08); }
            66% { transform: translate(-25px, 25px) scale(0.92); }
        }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ─── Main Container ─── */
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            z-index: 10;
        }

        .error-code {
            font-family: var(--font-serif);
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #ffffff 30%, var(--secondary-3) 70%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .error-message {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: var(--text);
            font-weight: 500;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* ─── Back Link button ─── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: linear-gradient(#0a0d16, #0a0d16) padding-box,
                        linear-gradient(135deg, var(--primary), var(--secondary-3)) border-box;
            color: #ffffff;
            border: 1.5px solid transparent;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.88rem;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            box-shadow: 0 4px 15px -5px rgba(92, 88, 237, 0.2);
            margin-bottom: 48px;
        }

        .back-link:hover {
            box-shadow: 0 12px 30px -8px rgba(92, 88, 237, 0.4);
            background: linear-gradient(#16223f, #16223f) padding-box,
                        linear-gradient(135deg, var(--secondary-3), var(--primary)) border-box;
        }

        /* ─── Custom Help Subtext ─── */
        .mistake-helper {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .mistake-helper a {
            color: var(--secondary-3);
            text-decoration: none;
            border-bottom: 1px dashed rgba(179, 176, 255, 0.4);
            transition: all 0.3s;
        }

        .mistake-helper a:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Ambient atmosphere -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="noise"></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-message">This page doesn't exist. Probably my fault.</p>
        
        <a href="index.html" class="back-link">
            ← Back to the main site
        </a>
        
        <div class="mistake-helper">
            Think this is a mistake? <a href="https://wa.me/919909249767" target="_blank">WhatsApp me</a>
        </div>
    </div>

</body>
</html>
